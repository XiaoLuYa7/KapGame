# Test Configuration
spring.profiles.active=test

# Server
server.port=0  # Use random port for tests

# Use H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

# Disable initialization of schema.sql for tests
spring.sql.init.mode=never

# JWT (use same secret for consistency)
jwt.secret=test-secret-key-for-jwt-verification-in-test-environment
jwt.expiration=3600000 # 1 hour for tests

# Logging
logging.level.com.beiguo=info
logging.level.org.springframework.security=warn
logging.level.org.springframework.test=warn

# Disable security for some tests (if needed)
#spring.security.enabled=false